services:
  - type: web
    name: qa-management-suite
    env: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install --prefix frontend && npm run build --prefix frontend && npm install --prefix backend
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false          # You will paste your Atlas URI in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_EXPIRE
        value: 7d